<!DOCTYPE html>
<html>
<head>
    <title>Location Search Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #764ba2; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🧪 Location Search API Test</h1>
    
    <div class="test-section">
        <h2>Test 1: Search by Location (Coordinates)</h2>
        <button onclick="testLocationSearch()">Test: Delhi (28.7041, 77.1025) - 50km radius</button>
        <pre id="test1-result"></pre>
    </div>

    <div class="test-section">
        <h2>Test 2: Search by City Name</h2>
        <button onclick="testCitySearch()">Test: Search for "Mumbai"</button>
        <pre id="test2-result"></pre>
    </div>

    <div class="test-section">
        <h2>Test 3: Search Patna</h2>
        <button onclick="testPatnaSearch()">Test: Search for "Patna"</button>
        <pre id="test3-result"></pre>
    </div>

    <div class="test-section">
        <h2>API Endpoints Status</h2>
        <button onclick="checkEndpoints()">Check All Endpoints</button>
        <pre id="endpoints-result"></pre>
    </div>

    <script>
        async function testLocationSearch() {
            const resultEl = document.getElementById('test1-result');
            resultEl.textContent = '⏳ Loading...';
            
            try {
                const response = await fetch('http://localhost:3000/api/hotels/search-by-location?lat=28.7041&lon=77.1025&radius=50');
                const data = await response.json();
                resultEl.innerHTML = `<span class="success">✅ Success</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultEl.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        async function testCitySearch() {
            const resultEl = document.getElementById('test2-result');
            resultEl.textContent = '⏳ Loading...';
            
            try {
                const response = await fetch('http://localhost:3000/api/hotels/search-by-name?location=Mumbai&limit=10');
                const data = await response.json();
                resultEl.innerHTML = `<span class="success">✅ Success</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultEl.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        async function testPatnaSearch() {
            const resultEl = document.getElementById('test3-result');
            resultEl.textContent = '⏳ Loading...';
            
            try {
                const response = await fetch('http://localhost:3000/api/hotels/search-by-name?location=Patna&limit=10');
                const data = await response.json();
                resultEl.innerHTML = `<span class="success">✅ Success</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultEl.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        async function checkEndpoints() {
            const resultEl = document.getElementById('endpoints-result');
            resultEl.textContent = '⏳ Checking endpoints...\n';
            
            const endpoints = [
                { name: 'Location Search', url: 'http://localhost:3000/api/hotels/search-by-location?lat=28.7041&lon=77.1025&radius=50' },
                { name: 'City Search', url: 'http://localhost:3000/api/hotels/search-by-name?location=Mumbai' },
                { name: 'Hotels List', url: 'http://localhost:3000/api/hotels/list' }
            ];

            let results = '';
            for (const endpoint of endpoints) {
                try {
                    const response = await fetch(endpoint.url);
                    const status = response.ok ? '✅' : '⚠️';
                    results += `${status} ${endpoint.name}: ${response.status}\n`;
                } catch (error) {
                    results += `❌ ${endpoint.name}: ${error.message}\n`;
                }
            }

            resultEl.textContent = results;
        }
    </script>
</body>
</html>
