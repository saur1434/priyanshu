[build]
  command = "echo 'Frontend ready for deployment'"
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { API_URL = "https://gocabingo-backend.onrender.com" }

[context.development]
  environment = { API_URL = "http://localhost:3000" }

[context.deploy-preview]
  environment = { API_URL = "https://gocabingo-backend.onrender.com" }
